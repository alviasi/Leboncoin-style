<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Leboncoin Clone</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: orange; padding: 15px; color: white; text-align: center; }
    .container { padding: 20px; max-width: 700px; margin: auto; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    input, select, button { padding: 10px; margin: 5px 0; width: 100%; }
    img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 10px; }
    .whatsapp { background: #25D366; color: white; text-decoration: none; display: inline-block; padding: 10px; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body><header>
  <h1>Mini Leboncoin Clone</h1>
</header><div class="container">  <h2>Post an Ad</h2>
  <input type="text" id="title" placeholder="Ad Title">
  <input type="text" id="price" placeholder="Price">
  <select id="category">
    <option value="">Select Category</option>
    <option value="Cars">Cars</option>
    <option value="Electronics">Electronics</option>
    <option value="Home">Home</option>
  </select>
  <input type="text" id="phone" placeholder="WhatsApp Number (e.g. 33612345678)">
  <input type="file" id="image">
  <button onclick="addAd()">Post Ad</button>  <h2>Search</h2>
  <input type="text" id="searchText" placeholder="Search title">
  <input type="number" id="maxPrice" placeholder="Max price">
  <select id="searchCategory">
    <option value="">All Categories</option>
    <option value="Cars">Cars</option>
    <option value="Electronics">Electronics</option>
    <option value="Home">Home</option>
  </select>
  <button onclick="displayAds()">Search</button>  <h2>Ads</h2>
  <div id="ads"></div></div><script>
  let ads = [];

  function addAd() {
    const title = document.getElementById('title').value;
    const price = document.getElementById('price').value;
    const category = document.getElementById('category').value;
    const phone = document.getElementById('phone').value;
    const imageInput = document.getElementById('image');

    if (!title || !price || !category || !phone) {
      alert('Please fill all fields');
      return;
    }

    const file = imageInput.files[0];

    if (file) {
      const reader = new FileReader();
      reader.onload = function(e) {
        ads.push({ title, price: Number(price), category, phone, image: e.target.result });
        displayAds();
      };
      reader.readAsDataURL(file);
    } else {
      ads.push({ title, price: Number(price), category, phone, image: null });
      displayAds();
    }
  }

  function displayAds() {
    const adsDiv = document.getElementById('ads');
    const searchText = document.getElementById('searchText').value.toLowerCase();
    const maxPrice = document.getElementById('maxPrice').value;
    const searchCategory = document.getElementById('searchCategory').value;

    adsDiv.innerHTML = '';

    const filtered = ads.filter(ad => {
      return (
        (!searchText || ad.title.toLowerCase().includes(searchText)) &&
        (!maxPrice || ad.price <= maxPrice) &&
        (!searchCategory || ad.category === searchCategory)
      );
    });

    filtered.forEach(ad => {
      adsDiv.innerHTML += `
        <div class="card">
          ${ad.image ? `<img src="${ad.image}">` : ''}
          <h3>${ad.title}</h3>
          <p>Category: ${ad.category}</p>
          <p>Price: ${ad.price}€</p>
          <a class="whatsapp" href="https://wa.me/${ad.phone}" target="_blank">Chat on WhatsApp</a>
        </div>
      `;
    });
  }
</script></body>
</html>
